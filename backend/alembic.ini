# ═══════════════════════════════════════════════════════════════════════
# Alembic configuration.
# Database URL is read from app.core.config at runtime (migrations/env.py)
# so we keep `sqlalchemy.url` empty here to avoid duplication.
# ═══════════════════════════════════════════════════════════════════════

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
timezone = UTC
sqlalchemy.url =

[post_write_hooks]
# (none — ruff/black are run from make targets, not alembic)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
