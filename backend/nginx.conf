worker_processes auto;
worker_rlimit_nofile 8192;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Performance ────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ─── Gzip ───────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ─── Rate Limiting ──────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=60r/s;

    # ─── Security Headers ───────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Body size ──────────────────────────────────────────────────
    client_max_body_size 1m;

    # ─── HTTP → HTTPS Redirect ──────────────────────────────────────
    server {
        listen 80;
        server_name api.tradeforge.in;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS Server ───────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.tradeforge.in;

        # SSL certificates (Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/api.tradeforge.in/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.tradeforge.in/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ─── Health check (no rate limit) ───────────────────────────
        location /health {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }

        # ─── Auth endpoints (strict rate limit) ─────────────────────
        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Webhook endpoints (dedicated rate limit) ───────────────
        location /api/webhook/ {
            limit_req zone=webhook burst=30 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ─── All other API endpoints ────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Docs ───────────────────────────────────────────────────
        location /docs {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }

        # ─── Default ────────────────────────────────────────────────
        location / {
            return 404 '{"error": "Not Found"}';
            add_header Content-Type application/json;
        }
    }
}
