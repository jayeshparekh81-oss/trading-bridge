<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { margin: 0; padding: 0; background: #f4f6f8; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .container { max-width: 600px; margin: 0 auto; background: #ffffff; }
  .header { background: #1a2332; padding: 24px; text-align: center; }
  .header h1 { color: #22c55e; margin: 0; font-size: 22px; }
  .content { padding: 32px 24px; color: #374151; line-height: 1.6; }
  .content h2 { color: #1a2332; margin-top: 0; }
  .alert-box { background: #fef2f2; border-left: 4px solid #ef4444; padding: 16px; margin: 16px 0; border-radius: 4px; }
  .success-box { background: #f0fdf4; border-left: 4px solid #22c55e; padding: 16px; margin: 16px 0; border-radius: 4px; }
  .info-box { background: #eff6ff; border-left: 4px solid #3b82f6; padding: 16px; margin: 16px 0; border-radius: 4px; }
  .footer { background: #f9fafb; padding: 16px 24px; text-align: center; font-size: 12px; color: #9ca3af; border-top: 1px solid #e5e7eb; }
  .btn { display: inline-block; padding: 12px 24px; background: #22c55e; color: #ffffff; text-decoration: none; border-radius: 6px; font-weight: 600; }
  table.stats { width: 100%; border-collapse: collapse; margin: 16px 0; }
  table.stats td { padding: 8px 12px; border-bottom: 1px solid #e5e7eb; }
  table.stats td:first-child { color: #6b7280; }
  table.stats td:last-child { font-weight: 600; text-align: right; }
  @media (max-width: 600px) { .content { padding: 20px 16px; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Trading Bridge</h1>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">
    <p>Trading Bridge &mdash; Automated Trading Platform</p>
    <p><a href="#" style="color:#6b7280;">Unsubscribe</a> | <a href="#" style="color:#6b7280;">Notification Settings</a></p>
  </div>
</div>
</body>
</html>
