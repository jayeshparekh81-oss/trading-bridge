<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="TRADETRI">
  <title>TRADETRI</title>

  <defs>
    <linearGradient id="ttf2-tiranga" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9933"/>
      <stop offset="50%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#138808"/>
    </linearGradient>
    <radialGradient id="ttf2-bindu">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
    <radialGradient id="ttf2-fill">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </radialGradient>
  </defs>

  <!-- Dark rounded background -->
  <rect x="0" y="0" width="32" height="32" rx="7" fill="url(#ttf2-fill)"/>

  <!-- Tiranga triangle — bolder stroke (3.5) so it survives 16px -->
  <polygon points="16,7 27,25 5,25"
           fill="none"
           stroke="url(#ttf2-tiranga)"
           stroke-width="3"
           stroke-linejoin="round"/>

  <!-- Single bold green candle (bullish signature) - wider, no stroke -->
  <rect x="13" y="15" width="6" height="8" rx="0.5" fill="#00FF88"/>

  <!-- Apex Om Bindu — bigger for 16px visibility -->
  <circle cx="16" cy="6" r="3" fill="url(#ttf2-bindu)"/>
  <circle cx="16" cy="6" r="1.1" fill="#FFFFFF"/>
</svg>
