<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 690" role="img" aria-label="TRADETRI — India's Algorithmic Trading Platform">
  <title>TRADETRI</title>
  <desc>Kalachakra 60-mark clock mandala with Tiranga triangle, 3 time-candles (Past, Present, Future), EMA growth curve, Om bindu, and wordmark composition.</desc>

  <style>
    @keyframes tt-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes tt-rotate-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes tt-pulse { 0%, 100% { transform: scale(1); opacity: 0.9; } 50% { transform: scale(1.18); opacity: 1; } }
    @keyframes tt-draw-ema { 0% { stroke-dashoffset: 600; opacity: 0.3; } 70% { stroke-dashoffset: 0; opacity: 1; } 100% { stroke-dashoffset: 0; opacity: 1; } }
    @keyframes tt-breathe { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.15); } }

    .mandala-outer { animation: tt-rotate 60s linear infinite; transform-origin: 250px 250px; transform-box: view-box; }
    .mandala-inner { animation: tt-rotate-rev 40s linear infinite; transform-origin: 250px 250px; transform-box: view-box; }
    .bindu-pulse  { animation: tt-pulse 2.5s ease-in-out infinite; transform-origin: 250px 90px; transform-box: view-box; }
    .ema-animated { stroke-dasharray: 600; animation: tt-draw-ema 5s ease-out infinite; }
    .candle-live  { animation: tt-breathe 4s ease-in-out infinite; }

    @media (prefers-reduced-motion: reduce) {
      .mandala-outer, .mandala-inner, .bindu-pulse, .ema-animated, .candle-live { animation: none; }
    }
  </style>

  <defs>
    <linearGradient id="tt-tiranga" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9933"/><stop offset="50%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#138808"/>
    </linearGradient>
    <linearGradient id="tt-ema" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/><stop offset="40%" stop-color="#FFD700"/><stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
    <linearGradient id="tt-saffron" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B35A00"/><stop offset="40%" stop-color="#FF9933"/><stop offset="60%" stop-color="#FFB366"/><stop offset="100%" stop-color="#B35A00"/>
    </linearGradient>
    <linearGradient id="tt-ivory" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8b8b8"/><stop offset="40%" stop-color="#F5F5F5"/><stop offset="60%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#b8b8b8"/>
    </linearGradient>
    <linearGradient id="tt-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#063d02"/><stop offset="40%" stop-color="#138808"/><stop offset="60%" stop-color="#1ea80a"/><stop offset="100%" stop-color="#063d02"/>
    </linearGradient>
    <linearGradient id="tt-trade-text" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#aaaaaa"/>
    </linearGradient>
    <linearGradient id="tt-tri-text" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/><stop offset="100%" stop-color="#00FF88"/>
    </linearGradient>
    <radialGradient id="tt-center">
      <stop offset="0%" stop-color="rgba(255, 215, 0, 0.15)"/>
      <stop offset="50%" stop-color="rgba(0, 255, 136, 0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="tt-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0d1125"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="tt-bindu">
      <stop offset="0%" stop-color="#FFFFFF"/><stop offset="40%" stop-color="#FFD700"/><stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>

    <filter id="tt-majorGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tt-candleShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tt-petalGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <g id="tt-petal">
      <path d="M 250,30 Q 258,55 256,80 Q 253,92 250,95 Q 247,92 244,80 Q 242,55 250,30 Z"
            fill="none" stroke="#FFFFFF" stroke-width="0.7" opacity="0.32"/>
      <circle cx="250" cy="35" r="1" fill="#FFD700" opacity="0.7"/>
    </g>
    <g id="tt-mintick">
      <line x1="250" y1="22" x2="250" y2="32" stroke="#FFE8A0" stroke-width="0.5" stroke-linecap="round" opacity="0.45"/>
    </g>
  </defs>

  <!-- Self-contained dark stage -->
  <rect x="0" y="0" width="500" height="690" rx="28" fill="url(#tt-bg)"/>

  <!-- Central glow behind mandala -->
  <circle cx="250" cy="250" r="240" fill="url(#tt-center)"/>
  <circle cx="250" cy="250" r="243" fill="none" stroke="#FFE8A0" stroke-width="0.3" opacity="0.3"/>
  <circle cx="250" cy="250" r="235" fill="none" stroke="#FFE8A0" stroke-width="0.4" opacity="0.22"/>

  <!-- ============ KALACHAKRA 60-MINUTE CLOCK (rotates 60s = 1 min sweep) ============ -->
  <g class="mandala-outer">

    <!-- 48 MINUTE TICKS (at every 6° except hour positions) -->
    <g>
      <g transform="rotate(6 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(12 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(18 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(24 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(36 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(42 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(48 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(54 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(66 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(72 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(78 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(84 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(96 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(102 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(108 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(114 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(126 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(132 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(138 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(144 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(156 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(162 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(168 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(174 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(186 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(192 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(198 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(204 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(216 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(222 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(228 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(234 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(246 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(252 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(258 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(264 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(276 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(282 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(288 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(294 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(306 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(312 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(318 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(324 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(336 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(342 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(348 250 250)"><use href="#tt-mintick"/></g>
      <g transform="rotate(354 250 250)"><use href="#tt-mintick"/></g>
    </g>

    <!-- 12 HOUR LOTUS PETALS (at every 30° = every 5 minutes) -->
    <g filter="url(#tt-petalGlow)">
      <use href="#tt-petal"/>
      <g transform="rotate(30 250 250)"><use href="#tt-petal"/></g>
      <g transform="rotate(60 250 250)"><use href="#tt-petal"/></g>
      <g transform="rotate(90 250 250)"><use href="#tt-petal"/></g>
      <g transform="rotate(120 250 250)"><use href="#tt-petal"/></g>
      <g transform="rotate(150 250 250)"><use href="#tt-petal"/></g>
      <g transform="rotate(180 250 250)"><use href="#tt-petal"/></g>
      <g transform="rotate(210 250 250)"><use href="#tt-petal"/></g>
      <g transform="rotate(240 250 250)"><use href="#tt-petal"/></g>
      <g transform="rotate(270 250 250)"><use href="#tt-petal"/></g>
      <g transform="rotate(300 250 250)"><use href="#tt-petal"/></g>
      <g transform="rotate(330 250 250)"><use href="#tt-petal"/></g>
    </g>
  </g>

  <!-- Decorative rings -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#FFE8A0" stroke-width="1" opacity="0.3"/>
  <circle cx="250" cy="250" r="212" fill="none" stroke="#FFF8DC" stroke-width="0.4" opacity="0.2" stroke-dasharray="2,4"/>

  <!-- Inner mandala (counter-rotates at 40s) -->
  <g class="mandala-inner">
    <circle cx="250" cy="250" r="195" fill="none" stroke="#FFE8A0" stroke-width="0.5" opacity="0.3" stroke-dasharray="6,4"/>
    <g fill="#FFF8DC" opacity="0.6">
      <circle cx="250" cy="55" r="2"/>
      <g transform="rotate(45 250 250)"><circle cx="250" cy="55" r="1.5"/></g>
      <g transform="rotate(90 250 250)"><circle cx="250" cy="55" r="2"/></g>
      <g transform="rotate(135 250 250)"><circle cx="250" cy="55" r="1.5"/></g>
      <g transform="rotate(180 250 250)"><circle cx="250" cy="55" r="2"/></g>
      <g transform="rotate(225 250 250)"><circle cx="250" cy="55" r="1.5"/></g>
      <g transform="rotate(270 250 250)"><circle cx="250" cy="55" r="2"/></g>
      <g transform="rotate(315 250 250)"><circle cx="250" cy="55" r="1.5"/></g>
    </g>
  </g>

  <circle cx="250" cy="250" r="165" fill="none" stroke="url(#tt-tiranga)" stroke-width="1.5" opacity="0.4"/>
  <polygon points="250,110 360,305 140,305" fill="none" stroke="#F59E0B" stroke-width="0.6" opacity="0.2"/>
  <polygon points="250,90 380,325 120,325" fill="url(#tt-center)" stroke="url(#tt-tiranga)" stroke-width="3.5" stroke-linejoin="round" filter="url(#tt-majorGlow)"/>

  <g opacity="0.12" stroke="#F59E0B" stroke-width="0.4" stroke-dasharray="1,4">
    <line x1="145" y1="195" x2="355" y2="195"/>
    <line x1="160" y1="245" x2="340" y2="245"/>
    <line x1="180" y1="285" x2="320" y2="285"/>
  </g>

  <!-- Trishul watermark -->
  <g opacity="0.08" stroke="#FFE8A0" stroke-width="1" stroke-linecap="round" fill="none">
    <line x1="250" y1="310" x2="250" y2="175"/>
    <path d="M 210,175 Q 215,155 225,150 L 225,185"/>
    <path d="M 290,175 Q 285,155 275,150 L 275,185"/>
    <line x1="250" y1="175" x2="250" y2="135"/>
    <path d="M 225,150 L 222,138 L 228,138 Z"/>
    <path d="M 275,150 L 272,138 L 278,138 Z"/>
    <path d="M 250,135 L 246,120 L 254,120 Z"/>
    <line x1="215" y1="175" x2="285" y2="175"/>
  </g>

  <!-- 3 candles (PAST / PRESENT / FUTURE) -->
  <g class="candle-live" filter="url(#tt-candleShadow)">
    <rect x="173" y="238" width="14" height="44" fill="#000" opacity="0.4"/>
    <line x1="180" y1="218" x2="180" y2="238" stroke="#FF9933" stroke-width="2"/>
    <rect x="170" y="238" width="20" height="44" fill="url(#tt-saffron)" stroke="#FF9933" stroke-width="1"/>
    <rect x="172" y="240" width="3" height="40" fill="#FFB366" opacity="0.6"/>
    <line x1="180" y1="282" x2="180" y2="300" stroke="#FF9933" stroke-width="2"/>
  </g>
  <g class="candle-live" filter="url(#tt-candleShadow)">
    <rect x="243" y="198" width="14" height="64" fill="#000" opacity="0.4"/>
    <line x1="250" y1="168" x2="250" y2="198" stroke="#FFFFFF" stroke-width="2"/>
    <rect x="240" y="198" width="20" height="64" fill="url(#tt-ivory)" stroke="#FFFFFF" stroke-width="1.5"/>
    <rect x="242" y="200" width="3" height="60" fill="#FFFFFF" opacity="0.8"/>
    <line x1="250" y1="262" x2="250" y2="295" stroke="#FFFFFF" stroke-width="2"/>
  </g>
  <g class="candle-live" filter="url(#tt-candleShadow)">
    <rect x="313" y="158" width="14" height="88" fill="#000" opacity="0.4"/>
    <line x1="320" y1="138" x2="320" y2="158" stroke="#138808" stroke-width="2"/>
    <rect x="310" y="158" width="20" height="88" fill="url(#tt-green)" stroke="#00FF88" stroke-width="1.5"/>
    <rect x="312" y="160" width="3" height="84" fill="#1ea80a" opacity="0.7"/>
    <line x1="320" y1="246" x2="320" y2="300" stroke="#138808" stroke-width="2"/>
  </g>

  <!-- EMA curve -->
  <path d="M 100,322 C 130,315 155,295 180,260 C 210,238 230,235 250,230 C 280,222 300,212 320,202 C 345,190 370,175 390,155"
        fill="none" stroke="url(#tt-ema)" stroke-width="3.5" stroke-linecap="round"
        filter="url(#tt-majorGlow)" class="ema-animated"/>

  <g filter="url(#tt-majorGlow)">
    <circle cx="250" cy="230" r="6" fill="#FFD700" opacity="0.9"/>
    <circle cx="250" cy="230" r="2.5" fill="#FFFFFF"/>
  </g>
  <g filter="url(#tt-majorGlow)">
    <circle cx="390" cy="155" r="8" fill="#00FF88" opacity="0.25"/>
    <circle cx="390" cy="155" r="5" fill="#00FF88" opacity="0.9"/>
    <circle cx="390" cy="155" r="2" fill="#FFFFFF"/>
  </g>

  <!-- Volume bars -->
  <g filter="url(#tt-candleShadow)">
    <rect x="170" y="310" width="20" height="12" fill="url(#tt-saffron)" stroke="#FF9933" stroke-width="0.5"/>
    <rect x="172" y="312" width="3" height="8" fill="#FFB366" opacity="0.6"/>
    <rect x="240" y="304" width="20" height="18" fill="url(#tt-ivory)" stroke="#FFFFFF" stroke-width="0.5"/>
    <rect x="242" y="306" width="3" height="14" fill="#FFFFFF" opacity="0.8"/>
    <rect x="310" y="296" width="20" height="26" fill="url(#tt-green)" stroke="#00FF88" stroke-width="0.5"/>
    <rect x="312" y="298" width="3" height="22" fill="#1ea80a" opacity="0.7"/>
  </g>

  <line x1="120" y1="325" x2="380" y2="325" stroke="#2a3142" stroke-width="1.5"/>
  <text x="128" y="340" font-family="Courier New, monospace" font-size="7" fill="#666" letter-spacing="1.5">VOL</text>
  <text x="350" y="340" font-family="Courier New, monospace" font-size="7" fill="#00FF88" letter-spacing="1.5">+▲</text>

  <!-- Candle labels -->
  <g font-family="Georgia, serif" font-weight="bold" text-anchor="middle" letter-spacing="2">
    <text x="180" y="360" font-size="11" fill="#FF9933">PAST</text>
    <text x="250" y="360" font-size="11" fill="#FFFFFF">PRESENT</text>
    <text x="320" y="360" font-size="11" fill="#00FF88">FUTURE</text>
  </g>
  <g font-family="Georgia, serif" text-anchor="middle" letter-spacing="1">
    <text x="180" y="375" font-size="9" fill="#FF9933" opacity="0.7">भूत</text>
    <text x="250" y="375" font-size="9" fill="#FFFFFF" opacity="0.7">वर्तमान</text>
    <text x="320" y="375" font-size="9" fill="#00FF88" opacity="0.7">भविष्य</text>
  </g>

  <g opacity="0.4" font-family="Courier New, monospace" font-size="7" fill="#666">
    <text x="388" y="198">H</text>
    <text x="388" y="258">M</text>
    <text x="388" y="298">L</text>
  </g>

  <!-- Apex Om Bindu -->
  <g class="bindu-pulse" filter="url(#tt-majorGlow)">
    <circle cx="250" cy="90" r="8" fill="url(#tt-bindu)"/>
    <circle cx="250" cy="90" r="3" fill="#FFFFFF"/>
    <text x="250" y="73" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#FFE8A0" opacity="0.7" font-weight="bold">ॐ</text>
  </g>

  <!-- Triskelion corner dots -->
  <g filter="url(#tt-candleShadow)">
    <circle cx="120" cy="325" r="4.5" fill="#FF9933" opacity="0.95"/>
    <circle cx="120" cy="325" r="2" fill="#FFF8DC"/>
    <circle cx="380" cy="325" r="4.5" fill="#138808" opacity="0.95"/>
    <circle cx="380" cy="325" r="2" fill="#FFF8DC"/>
  </g>

  <!-- ============ WORDMARK + TAGLINES (baked into SVG) ============ -->

  <!-- Subtle divider -->
  <line x1="140" y1="500" x2="360" y2="500" stroke="#F59E0B" stroke-width="0.4" opacity="0.25"/>

  <!-- TRADETRI wordmark -->
  <text x="250" y="555"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="bold"
        font-size="40"
        letter-spacing="5"
        text-anchor="middle">
    <tspan fill="url(#tt-trade-text)">TRADE</tspan><tspan fill="url(#tt-tri-text)">TRI</tspan>
  </text>

  <!-- Tagline -->
  <text x="250" y="590"
        font-family="Courier New, monospace"
        font-size="10"
        fill="#F59E0B"
        opacity="0.55"
        letter-spacing="3"
        text-anchor="middle">◆  INDIA'S ALGORITHMIC TRADING PLATFORM  ◆</text>

  <!-- Sanskrit mantras -->
  <text x="250" y="625"
        font-family="Georgia, serif"
        font-size="12"
        fill="#888"
        opacity="0.85"
        letter-spacing="2"
        text-anchor="middle">ॐ  ·  कालचक्र  ·  त्रिकाल  ·  त्रिशूल  ·  त्रिस्केलियन</text>

  <!-- English transliterations -->
  <text x="250" y="655"
        font-family="Courier New, monospace"
        font-size="9"
        fill="#666"
        letter-spacing="2"
        text-anchor="middle">KALACHAKRA  ·  TRIKALA  ·  TRISHUL  ·  TRISKELION</text>
</svg>
